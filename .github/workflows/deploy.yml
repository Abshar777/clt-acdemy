name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch:

# Never run two deploys at once; queue them instead of overlapping.
concurrency:
  group: deploy-vps
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy over SSH
        uses: appleboy/ssh-action@v1.2.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script_stop: true
          command_timeout: "20m"
          script: bash /root/cltAcademy/deploy.sh
